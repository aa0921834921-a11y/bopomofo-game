// ── 語音修復核心 ──
let voiceOn=true,zhVoice=null;
function initVoice(){
  const vs=speechSynthesis.getVoices();
  zhVoice=vs.find(v=>v.lang==='zh-TW')||vs.find(v=>v.lang==='zh-TW-Standard-A')||vs.find(v=>v.lang.startsWith('zh'))||null;
}
speechSynthesis.onvoiceschanged=initVoice;
setTimeout(initVoice,500);

// iPad 強制解鎖語音
function unlockAudio() {
  try {
    speechSynthesis.cancel();
    const dummy = new SpeechSynthesisUtterance(' ');
    dummy.volume = 0;
    speechSynthesis.speak(dummy);
  } catch(e) {}
}

function speak(text,rate=0.85,pitch=1.1){
  if(!voiceOn)return;
  try{
    speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);
    u.lang='zh-TW';u.rate=rate;u.pitch=pitch;
    if(zhVoice)u.voice=zhVoice;
    speechSynthesis.speak(u);
  }catch(e){}
}

function showMap(){
  unlockAudio(); // 關鍵！點擊瞬間解鎖
  document.getElementById('intro').style.display='none';
  document.getElementById('worldmap').style.display='block';
  setTimeout(() => speak("準備好冒險了嗎？"), 100);
  buildGems();
  buildZones();
}

const UNLOCK_MAP={0:[1],1:[2,3],2:[4],3:[5,6],4:[7]};
const PATHS=[[0,1],[1,2],[1,3],[2,4],[3,5],[3,6],[4,7]];
const ALL_ZH=['ㄅ','ㄆ','ㄇ','ㄈ','ㄉ','ㄊ','ㄋ','ㄌ','ㄍ','ㄎ','ㄏ','ㄐ','ㄑ','ㄒ','ㄓ','ㄔ','ㄕ','ㄖ','ㄗ','ㄘ','ㄙ','ㄚ','ㄛ','ㄜ','ㄞ','ㄟ','ㄠ','ㄡ','ㄢ','ㄣ','ㄤ','ㄥ','ㄦ','ㄧ','ㄨ','ㄩ'];

let stars=0,curZone=null,curItemIdx=0,quizDone=false;

function buildGems(){
  const el=document.getElementById('map-gems');el.innerHTML='';
  for(let i=0;i<5;i++){const g=document.createElement('div');g.className='mgem'+(i<stars?' on':'');el.appendChild(g);}
}
function addStar(){stars=Math.min(5,stars+1);buildGems();}

function buildZones(){
  const c=document.getElementById('zones-container');c.innerHTML='';
  PATHS.forEach(([a,b])=>{
    const za=ZONES[a],zb=ZONES[b];
    const x1=za.x+40,y1=za.y+40,x2=zb.x+40,y2=zb.y+40;
    const len=Math.sqrt((x2-x1)**2+(y2-y1)**2);
    const angle=Math.atan2(y2-y1,x2-x1)*180/Math.PI;
    const line=document.createElement('div');line.className='path-line';
    line.style.cssText=`width:${len}px;height:2px;left:${x1}px;top:${y1}px;transform-origin:0 50%;transform:rotate(${angle}deg);`;
    c.appendChild(line);
  });
  ZONES.forEach(z=>{
    const el=document.createElement('div');
    el.className='zone'+(z.un?'':' locked');
    el.style.cssText=`left:${z.x}px;top:${z.y}px;width:80px;height:80px;`;
    if(z.un) el.onclick=()=>enterZone(z.id);
    const col=z.un?z.col:'#3A5F88';
    el.innerHTML=`
      <svg width="80" height="70" viewBox="0 0 80 70">
        <polygon points="40,2 78,22 78,48 40,68 2,48 2,22" fill="${col}1A" stroke="${col}" stroke-width="1.5"/>
      </svg>
      <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-60%);font-size:1.9rem;">${z.un?z.guide:'🔒'}</div>
    `;
    c.appendChild(el);
  });
}

function enterZone(zid){
  curZone=ZONES[zid];curItemIdx=0;
  document.getElementById('worldmap').style.display='none';
  document.getElementById('lesson').style.display='block';
  document.getElementById('guide-ch').textContent=curZone.guide;
  document.getElementById('lbg').className='lesson-bg sbg-'+curZone.scene;
  document.getElementById('sground').className='scene-ground sg-'+curZone.scene;
  showLearn();
}

function showLearn(){
  const item=curZone.items[curItemIdx];
  const ca=document.getElementById('card-area');ca.innerHTML='';
  mkBackVol(ca);
  const card=document.createElement('div');
  card.style.cssText=S.learnCard;
  card.innerHTML=`<div style="font-size:4.5rem;">${item.ico}</div><div style="font-size:1.5rem;color:#FFF;">${item.nm}</div>`;
  const btn=document.createElement('button');
  btn.style.cssText=S.nextBtn; btn.textContent='來挑戰 →';
  btn.onclick=()=>showQuiz(item);
  card.appendChild(btn);
  ca.appendChild(card);
  speakItem(item);
}

function speakItem(it){speak(it.nm);setTimeout(()=>speak(ZH_S[it.zh]||it.zh),800);}

function showQuiz(item){
  const ca=document.getElementById('card-area');ca.innerHTML='';
  mkBackVol(ca);
  const card=document.createElement('div');
  card.style.cssText=S.quizCard;
  const opts=getOpts(item.zh);
  opts.forEach((o,i)=>{
    const b=document.createElement('button');
    b.textContent=o; b.style.cssText=S.optBtn(i);
    b.onclick=()=>checkQ(o,item);
    card.appendChild(b);
  });
  ca.appendChild(card);
}

function checkQ(chosen,item){
  if(chosen===item.zh){ speak("答對了！"); addStar(); nextItem(); }
  else { speak("再試一次！"); }
}

function nextItem(){
  curItemIdx++;
  if(curItemIdx>=curZone.items.length) showMap();
  else showLearn();
}

function getOpts(correctZh){
  const wrong=ALL_ZH.filter(z=>z!==correctZh).sort(()=>Math.random()-0.5).slice(0,3);
  return [correctZh,...wrong].sort(()=>Math.random()-0.5);
}

function mkBackVol(ca){
  const b=document.createElement('button'); b.textContent='←'; b.style.cssText=S.backBtn; b.onclick=showMap; ca.appendChild(b);
}

// 星空背景
for(let i=0;i<50;i++){
  const s=document.createElement('div');s.className='star';
  s.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${2+Math.random()*2}s;--delay:${Math.random()*2}s;`;
  document.getElementById('stars-bg').appendChild(s);
}
</script>
</body>
</html>
