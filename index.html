<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>注音冒險世界-終極修復</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Nunito:wght@400;700;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;background:#08111F;}
body{font-family:'Nunito',sans-serif;display:flex;flex-direction:column;align-items:center;}

/* 解決地圖被切掉的關鍵：Responsive Game Container */
#game{
  width: 100%; height: 100%; max-width: 768px;
  position: relative; overflow: hidden;
  display: flex; flex-direction: column;
}

#intro, #worldmap, #lesson {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  padding: env(safe-area-inset-top) 20px env(safe-area-inset-bottom);
}

#intro { z-index: 100; align-items: center; justify-content: center; background: #08111F; }
#worldmap { display: none; z-index: 50; }
#lesson { display: none; z-index: 60; }

/* 讓地圖可以滾動，不被切斷 */
.map-scroll-area {
  flex: 1; width: 100%; overflow-y: auto; overflow-x: hidden;
  padding-top: 60px; padding-bottom: 40px;
  -webkit-overflow-scrolling: touch;
}
.map-content { position: relative; width: 100%; min-height: 500px; }

/* 原本的精美風格 */
.star{position:absolute;width:2px;height:2px;background:white;border-radius:50%;animation:twinkle var(--d) infinite var(--delay);}
@keyframes twinkle{0%,100%{opacity:0.2}50%{opacity:1}}
.intro-title{font-size:2.4rem;font-weight:900;color:#fff;text-align:center;line-height:1.1;margin:20px 0;}
.intro-title span{color:#00FFB2;}
.btn-main{padding:16px 45px;border:none;border-radius:50px;background:linear-gradient(135deg,#00FFB2,#7B61FF);font-size:1.2rem;font-weight:900;color:#08111F;cursor:pointer;box-shadow:0 10px 20px rgba(0,255,178,0.3);}

/* 地點樣式優化 */
.zone {
  position: absolute; width: 80px; height: 80px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  cursor: pointer; transition: transform 0.2s;
}
.zone.locked { opacity: 0.3; filter: grayscale(1); }
.zone-icon { font-size: 2.2rem; z-index: 2; margin-bottom: 5px; }
.zone-label { font-family: 'Orbitron'; font-size: 8px; color: #00FFB2; }
.zone-bg { position: absolute; inset: 0; z-index: 1; }

.map-hud{position:absolute;top:0;left:0;right:0;height:54px;background:rgba(8,17,31,0.9);display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:100;border-bottom:1px solid rgba(0,255,178,0.1);}

#card-area { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; width: 100%; }
.back-btn { position: absolute; top: 15px; left: 15px; background: rgba(0,0,0,0.5); color: #fff; border: 1px solid #444; padding: 5px 15px; border-radius: 20px; z-index: 100; font-size: 0.8rem; }
</style>
</head>
<body>
<div id="game">
  <div id="intro">
    <div id="stars-bg"></div>
    <div style="font-family:'Orbitron'; color:#00FFB2; letter-spacing:2px; font-size:10px;">C.L.A.D.E. // 注音偵探</div>
    <div class="intro-title">注音<span>冒險</span><br>世界</div>
    <div style="font-size:5rem; margin:20px 0; animation: float 3s infinite ease-in-out;">🦊</div>
    <button class="btn-main" onclick="startAdventure()">▶ 進入世界</button>
  </div>

  <div id="worldmap">
    <div class="map-hud">
      <div style="font-family:'Orbitron'; color:#00FFB2; font-size:12px;">🗺 WORLD MAP</div>
      <div style="color:#FFD93D; font-size:14px;" id="gem-count">⭐⭐⭐⭐⭐</div>
    </div>
    <div class="map-scroll-area">
      <div class="map-content" id="zones-container">
        </div>
    </div>
    <div style="text-align:center; padding: 10px; font-size: 10px; color: #6A90B8; background: rgba(8,17,31,0.8);">🦊 提示：手指上下滑動可以查看更多地點</div>
  </div>

  <div id="lesson">
    <button class="back-btn" onclick="showMap()">← 地圖</button>
    <div id="card-area"></div>
  </div>
</div>

<script>
// --- 語音包優化：強制篩選台灣女性語音 ---
let twVoice = null;
function initVoice() {
  const voices = speechSynthesis.getVoices();
  // 優先序：台灣 Google 國語 (最像台灣人) > 台灣 Mei-Jia > 一般 zh-TW
  twVoice = voices.find(v => v.lang === 'zh-TW' && v.name.includes('Google')) ||
            voices.find(v => v.lang === 'zh-TW' && v.name.includes('Mei-Jia')) ||
            voices.find(v => v.lang === 'zh-TW') ||
            voices.find(v => v.lang.includes('zh-Hant')) || null;
}
speechSynthesis.onvoiceschanged = initVoice;
initVoice();

function speak(text, rate = 0.75) {
  try {
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.voice = twVoice;
    u.lang = 'zh-TW';
    u.rate = rate; // 語速調慢，適合小孩
    u.pitch = 1.1; // 音調稍微提高，聽起來較親切
    speechSynthesis.speak(u);
  } catch(e) {}
}

// --- 地點資料 ---
const ZONES = [
  {id:0, label:'BAT CAVE', ico:'🦇', nm:'蝙蝠', zh:'ㄅ', x:40, y:50, un:true},
  {id:1, label:'BUBBLE', ico:'🫧', nm:'泡泡', zh:'ㄆ', x:200, y:120, un:true},
  {id:2, label:'CAT CITY', ico:'🐱', nm:'貓咪', zh:'ㄇ', x:80, y:230, un:true},
  {id:3, label:'PLANE', ico:'✈️', nm:'飛機', zh:'ㄈ', x:220, y:300, un:true},
  {id:4, label:'CARROT', ico:'🥕', nm:'蘿蔔', zh:'ㄉ', x:60, y:420, un:true},
  {id:5, label:'RABBIT', ico:'🐰', nm:'兔子', zh:'ㄊ', x:200, y:500, un:true},
  {id:6, label:'FOREST', ico:'🌲', nm:'森林', zh:'ㄋ', x:100, y:620, un:true}
];

function startAdventure() {
  speak("歡迎來到注音冒險世界，我們出發吧！");
  showMap();
}

function showMap() {
  document.getElementById('intro').style.display = 'none';
  document.getElementById('lesson').style.display = 'none';
  document.getElementById('worldmap').style.display = 'flex';
  renderMap();
}

function renderMap() {
  const container = document.getElementById('zones-container');
  container.innerHTML = '';
  ZONES.forEach(z => {
    const div = document.createElement('div');
    div.className = `zone ${z.un ? '' : 'locked'}`;
    div.style.left = z.x + 'px';
    div.style.top = z.y + 'px';
    div.innerHTML = `
      <div class="zone-icon">${z.ico}</div>
      <div class="zone-label">${z.label}</div>
      <svg class="zone-bg" viewBox="0 0 80 80"><polygon points="40,5 75,25 75,55 40,75 5,55 5,25" fill="rgba(0,255,178,0.1)" stroke="#00FFB2" stroke-width="1.5"/></svg>
    `;
    if(z.un) div.onclick = () => enterZone(z);
    container.appendChild(div);
  });
}

function enterZone(z) {
  document.getElementById('worldmap').style.display = 'none';
  document.getElementById('lesson').style.display = 'flex';
  const ca = document.getElementById('card-area');
  ca.innerHTML = `
    <div style="text-align:center;">
      <div style="font-size:6rem; margin-bottom:20px; animation: float 3s infinite;">${z.ico}</div>
      <h2 style="color:#00FFB2; font-size:2.5rem; margin-bottom:10px;">${z.nm}</h2>
      <div style="font-size:4rem; color:white;">${z.zh}</div>
      <button class="btn-main" style="margin-top:30px;" onclick="speak('${z.nm}，${z.zh}')">🔊 再聽一次</button>
    </div>
  `;
  speak(`${z.nm}，注音是，${z.zh}`);
}

// 星空背景
const starContainer = document.getElementById('stars-bg');
for(let i=0; i<50; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  s.style.cssText = `left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${2+Math.random()*2}s;--delay:${Math.random()*2}s;`;
  starContainer.appendChild(s);
}
</script>
<style>
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-15px)} }
</style>
</body>
</html>
