<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>注音冒險世界-手機優化版</title>
<style>
  /* 解決手機截掉一半的問題：使用百分比與彈性佈局 */
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { 
    width: 100%; 
    height: 100%; 
    margin: 0; 
    padding: 0; 
    background: #08111F; 
    color: white; 
    font-family: sans-serif; 
    overflow: hidden; 
  }
  #game { 
    width: 100%; 
    height: 100%; 
    display: flex; 
    flex-direction: column; 
    position: relative;
  }
  #intro, #worldmap, #lesson {
    flex: 1;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  #worldmap, #lesson { display: none; }

  .btn { 
    padding: 15px 40px; 
    font-size: 1.2rem; 
    background: #00FFB2; 
    color: #08111F; 
    border: none; 
    border-radius: 50px; 
    cursor: pointer; 
    font-weight: bold;
    margin-top: 20px;
    box-shadow: 0 4px 15px rgba(0,255,178,0.3);
  }
  .zone { 
    width: 70px; height: 70px; 
    background: rgba(0,255,178,0.2); 
    border: 2px solid #00FFB2; 
    border-radius: 15px; 
    display: flex; 
    align-items: center; 
    justify-content: center; 
    font-size: 1.8rem;
    margin: 10px;
  }
  .map-container {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }
</style>
</head>
<body>

<div id="game">
  <div id="intro">
    <div style="font-size: 4rem;">🦊</div>
    <h1 style="margin: 10px 0;">注音冒險世界</h1>
    <p style="color: #6A90B8;">準備好開始了嗎？</p>
    <button class="btn" onclick="startGame()">▶ 點我開始</button>
  </div>

  <div id="worldmap">
    <h2>🗺 選擇地點</h2>
    <div class="map-container">
      <div class="zone" onclick="enterZone(0)">🦇</div>
      <div class="zone" onclick="enterZone(1)">🐰</div>
    </div>
  </div>

  <div id="lesson">
    <div id="lesson-icon" style="font-size: 6rem;"></div>
    <h2 id="lesson-name" style="font-size: 2rem; margin: 20px 0;"></h2>
    <button class="btn" onclick="goBack()">返回地圖</button>
  </div>
</div>

<script>
let preferredVoice = null;

// 尋找最好聽的台灣配音員
function loadVoices() {
    const voices = window.speechSynthesis.getVoices();
    // 優先序：台灣 Google 國語 > 台灣廣播等級配音 > 一般中文
    preferredVoice = voices.find(v => v.lang === 'zh-TW' && v.name.includes('Google')) || 
                     voices.find(v => v.lang === 'zh-TW') || 
                     voices.find(v => v.lang.includes('zh-Hant')) ||
                     voices.find(v => v.lang.startsWith('zh'));
}

window.speechSynthesis.onvoiceschanged = loadVoices;
loadVoices();

function speak(text) {
    try {
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(text);
        u.voice = preferredVoice;
        u.lang = 'zh-TW';
        u.rate = 0.7; // 語速調慢 (預設是1.0)
        u.pitch = 1.1; // 音調稍微提高，聽起來比較親切
        window.speechSynthesis.speak(u);
    } catch(e) {}
}

function startGame() {
    // 解鎖語音
    speak("出發囉！");
    document.getElementById('intro').style.display = 'none';
    document.getElementById('worldmap').style.display = 'flex';
}

const DATA = [
  { nm: '蝙蝠', zh: 'ㄅ', ico: '🦇' },
  { nm: '兔子', zh: 'ㄊ', ico: '🐰' }
];

function enterZone(id) {
    const item = DATA[id];
    document.getElementById('worldmap').style.display = 'none';
    document.getElementById('lesson').style.display = 'flex';
    document.getElementById('lesson-icon').textContent = item.ico;
    document.getElementById('lesson-name').textContent = item.nm + ' (' + item.zh + ')';
    
    speak(item.nm);
    setTimeout(() => speak(item.zh), 1200);
}

function goBack() {
    document.getElementById('lesson').style.display = 'none';
    document.getElementById('worldmap').style.display = 'flex';
}
</script>

</body>
</html>
