<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>注音冒險世界-最終修復版</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Nunito:wght@400;700;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;background:#08111F;color:white;font-family:'Nunito',sans-serif;}
#game{width:100%;height:100vh;position:relative;max-width:768px;margin:0 auto;}
#intro{position:absolute;inset:0;background:#08111F;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;}
.btn{padding:18px 50px;border:none;border-radius:50px;background:linear-gradient(135deg,#00FFB2,#7B61FF);font-size:1.4rem;font-weight:900;color:#08111F;cursor:pointer;box-shadow:0 0 20px rgba(0,255,178,0.4);-webkit-appearance:none;}
#worldmap, #lesson{position:absolute;inset:0;display:none;z-index:50;}
.star{position:absolute;width:2px;height:2px;background:white;border-radius:50%;animation:twinkle 2s infinite;}
@keyframes twinkle{0%,100%{opacity:0.2}50%{opacity:1}}
.map-bg{position:absolute;inset:0;background:radial-gradient(circle at center,#142240,#08111F);}
.zone{position:absolute;width:80px;height:80px;background:rgba(0,255,178,0.1);border:2px solid #00FFB2;border-radius:15px;display:flex;align-items:center;justify-content:center;font-size:2rem;cursor:pointer;}
</style>
</head>
<body>
<div id="game">
  <div id="intro">
    <h1 style="font-size:2.5rem;margin-bottom:10px;">注音冒險世界</h1>
    <p style="color:#6A90B8;margin-bottom:40px;">穩定修復版 (v4.0)</p>
    <div style="font-size:5rem;margin-bottom:20px;">🦊</div>
    <button class="btn" id="main-start-btn">▶ 立即出發</button>
  </div>

  <div id="worldmap">
    <div class="map-bg"></div>
    <div style="position:relative;z-index:60;padding:20px;text-align:center;">
      <h2 style="margin-top:20px;">🗺 選擇冒險地點</h2>
      <div class="zone" style="left:20%;top:200px;" onclick="enterZone(0)">🦇</div>
      <div class="zone" style="right:20%;top:300px;" onclick="enterZone(1)">🦊</div>
    </div>
  </div>

  <div id="lesson">
    <div style="padding:60px;text-align:center;position:relative;z-index:60;">
      <div id="lesson-icon" style="font-size:7rem;margin-bottom:20px;"></div>
      <h2 id="lesson-name" style="font-size:2.5rem;margin-bottom:40px;"></h2>
      <button class="btn" onclick="goBack()">返回地圖</button>
    </div>
  </div>
</div>

<script>
// --- 核心邏輯 ---
const startBtn = document.getElementById('main-start-btn');
const intro = document.getElementById('intro');
const worldmap = document.getElementById('worldmap');

// 綁定點擊事件 (支援滑鼠與觸控)
startBtn.addEventListener('click', forceStart);
startBtn.addEventListener('touchstart', function(e){
    e.preventDefault();
    forceStart();
}, {passive: false});

function forceStart() {
    console.log("Button clicked!");
    
    // 1. 優先切換畫面 (這一步絕對不能失敗)
    intro.style.display = 'none';
    worldmap.style.display = 'block';

    // 2. 隨後嘗試解鎖語音
    try {
        window.speechSynthesis.cancel();
        const dummy = new SpeechSynthesisUtterance(' ');
        window.speechSynthesis.speak(dummy);
        
        const welcome = new SpeechSynthesisUtterance('出發冒險吧！');
        welcome.lang = 'zh-TW';
        welcome.rate = 0.9;
        window.speechSynthesis.speak(welcome);
    } catch (err) {
        console.warn("Speech blocked, but game continues.");
    }
}

function speak(text) {
    try {
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(text);
        u.lang = 'zh-TW';
        u.rate = 0.8;
        window.speechSynthesis.speak(u);
    } catch(e) {}
}

const DATA = [
  { nm: '蝙蝠', zh: 'ㄅ', ico: '🦇' },
  { nm: '狐狸', zh: 'ㄏ', ico: '🦊' }
];

function enterZone(id) {
    const item = DATA[id];
    worldmap.style.display = 'none';
    document.getElementById('lesson').style.display = 'block';
    document.getElementById('lesson-icon').textContent = item.ico;
    document.getElementById('lesson-name').textContent = item.nm + ' (' + item.zh + ')';
    speak(item.nm);
    setTimeout(() => speak(item.zh), 1000);
}

function goBack() {
    document.getElementById('lesson').style.display = 'none';
    worldmap.style.display = 'block';
}

// 裝飾用星星
for(let i=0; i<40; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    s.style.left = Math.random()*100 + '%';
    s.style.top = Math.random()*100 + '%';
    s.style.animationDelay = Math.random()*2 + 's';
    intro.appendChild(s);
}
</script>
</body>
</html>
