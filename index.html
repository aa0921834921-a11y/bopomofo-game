<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>朱杰凱の注音冒險世界</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Nunito:wght@400;700;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;background:#08111F;}
body{font-family:'Nunito',sans-serif;touch-action:manipulation;}
#game{width:100%;height:100vh;position:relative;overflow:hidden;max-width:768px;margin:0 auto;}
.stars-wrap{position:absolute;inset:0;overflow:hidden;pointer-events:none;}
.star{position:absolute;border-radius:50%;background:white;animation:twinkle var(--d) infinite var(--delay);}
@keyframes twinkle{0%,100%{opacity:0.15}50%{opacity:1}}
@keyframes fl{0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}
@keyframes fdin{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes fdout{from{opacity:1;transform:scale(1)}to{opacity:0;transform:scale(1.05)}}
@keyframes pulse-ring{0%{transform:scale(0.95);opacity:0.7}70%{transform:scale(1.08);opacity:0.3}100%{transform:scale(0.95);opacity:0.7}}
@keyframes scan{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
@keyframes pdot{0%,100%{opacity:0.2}50%{opacity:1}}
@keyframes zglow{0%,100%{opacity:0.4;transform:scale(1)}50%{opacity:1;transform:scale(1.3)}}
@keyframes prise{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-100px) scale(0.5)}}
@keyframes bump{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
@keyframes cardfade{from{opacity:0}to{opacity:1}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}

/* HOMEPAGE */
#homepage{position:absolute;inset:0;background:#08111F;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200;}
.hp-scanline{position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,#00FFB2,transparent);animation:scan 4s linear infinite;}
.hp-logo{font-family:'Orbitron',monospace;font-size:9px;letter-spacing:0.3em;color:#00FFB2;margin-bottom:6px;animation:fdin 1s 0.3s both;}
.hp-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(0,255,178,0.08);border:1px solid rgba(0,255,178,0.25);border-radius:20px;padding:4px 14px;font-family:'Orbitron',monospace;font-size:8px;letter-spacing:0.15em;color:#00FFB2;margin-bottom:20px;animation:fdin 1s 0.5s both;}
.hp-badge-dot{width:6px;height:6px;border-radius:50%;background:#00FFB2;animation:twinkle 1.5s infinite;}
.hp-hero{position:relative;margin-bottom:16px;animation:fdin 1s 0.7s both;}
.hp-hero-ring{position:absolute;inset:-20px;border-radius:50%;border:1px solid rgba(0,255,178,0.2);animation:pulse-ring 3s ease-in-out infinite;}
.hp-hero-ring2{position:absolute;inset:-36px;border-radius:50%;border:1px solid rgba(123,97,255,0.15);animation:pulse-ring 3s ease-in-out infinite 0.5s;}
.hp-char{font-size:5.5rem;display:block;animation:fl 3s ease-in-out infinite;position:relative;z-index:1;}
.hp-title{font-size:2.8rem;font-weight:900;color:#fff;text-align:center;line-height:1.05;margin-bottom:6px;animation:fdin 1s 0.9s both;}
.hp-title em{color:#00FFB2;font-style:normal;}
.hp-subtitle{font-size:0.88rem;color:#6A90B8;text-align:center;margin-bottom:8px;animation:fdin 1s 1.1s both;}
.hp-stats{display:flex;gap:16px;margin-bottom:28px;animation:fdin 1s 1.2s both;}
.hp-stat{text-align:center;}
.hp-stat-num{font-family:'Orbitron',monospace;font-size:1.1rem;font-weight:700;color:#00FFB2;}
.hp-stat-lbl{font-size:0.7rem;color:#3A5F88;letter-spacing:0.1em;}
.hp-btn-wrap{position:relative;animation:fdin 1s 1.4s both;}
.hp-btn-glow{position:absolute;inset:-8px;border-radius:60px;background:linear-gradient(135deg,#00FFB240,#7B61FF40);filter:blur(12px);animation:pulse-ring 2s infinite;}
.hp-start{position:relative;display:flex;align-items:center;gap:10px;padding:16px 44px;border:none;border-radius:60px;background:linear-gradient(135deg,#00FFB2,#7B61FF);font-size:1.15rem;font-weight:900;color:#08111F;cursor:pointer;font-family:'Nunito',sans-serif;z-index:1;}
.hp-start:active{transform:scale(0.97);}
.hp-hint{position:absolute;bottom:28px;font-family:'Orbitron',monospace;font-size:8px;letter-spacing:0.15em;color:#3A5F88;animation:fdin 1s 1.8s both;}
.hp-particle{position:absolute;font-size:1.4rem;pointer-events:none;animation:fl var(--d) ease-in-out infinite var(--delay);}

/* WORLD MAP */
#worldmap{position:absolute;inset:0;display:none;}
.map-bg{position:absolute;inset:0;background:linear-gradient(160deg,#0A1628 0%,#0D2140 45%,#0A1628 100%);}
.map-grid-svg{position:absolute;inset:0;opacity:0.05;}
.map-hud{position:absolute;top:0;left:0;right:0;height:54px;background:rgba(8,17,31,0.9);border-bottom:1px solid rgba(0,255,178,0.15);display:flex;align-items:center;justify-content:space-between;padding:0 1rem;z-index:10;}
.map-title{font-family:'Orbitron',monospace;font-size:9px;letter-spacing:0.2em;color:#00FFB2;display:flex;align-items:center;gap:8px;}
.map-gems{display:flex;gap:4px;}
.mgem{width:14px;height:14px;clip-path:polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%);background:rgba(255,255,255,0.1);transition:all 0.3s;}
.mgem.on{background:#FFD93D;filter:drop-shadow(0 0 3px #FFD93D);}
.guide-bubble{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);background:rgba(13,24,41,0.95);border:1px solid rgba(0,255,178,0.3);border-radius:14px;padding:9px 16px;font-size:0.82rem;color:#E2F0FF;z-index:10;white-space:nowrap;}
.zone{position:absolute;cursor:pointer;transition:transform 0.2s;}
.zone:active{transform:scale(0.95);}
.zone.locked{opacity:0.38;pointer-events:none;}
.path-line{position:absolute;background:rgba(0,255,178,0.15);border-radius:4px;pointer-events:none;}
.path-dot{position:absolute;width:5px;height:5px;background:#00FFB2;border-radius:50%;pointer-events:none;animation:pdot 1.5s infinite;}
.zone-glow{position:absolute;width:12px;height:12px;border-radius:50%;top:3px;right:3px;animation:zglow 2s infinite;}

/* LESSON */
#lesson{position:absolute;inset:0;display:none;}
.lesson-bg{position:absolute;inset:0;transition:background 0.6s;}
.lesson-scene{position:absolute;inset:0;overflow:hidden;}
.scene-ground{position:absolute;bottom:0;left:0;right:0;height:110px;}
.guide-char{position:absolute;bottom:105px;left:18px;font-size:3.2rem;animation:fl 3s ease-in-out infinite;}
.step-indicator{position:absolute;top:14px;right:14px;font-family:'Orbitron',monospace;font-size:8px;letter-spacing:0.12em;color:#3A5F88;z-index:20;}
.particle{position:absolute;pointer-events:none;animation:prise var(--d) ease-out forwards;}
.sbg-jungle{background:linear-gradient(180deg,#0B2518,#1A4A2A 65%,#0D2B1A);}
.sbg-desert{background:linear-gradient(180deg,#281506,#3D2A10 65%,#2A1808);}
.sbg-city{background:linear-gradient(180deg,#14142A,#252540 65%,#1A1A2E);}
.sbg-sky{background:linear-gradient(180deg,#081422,#0E1E3C 65%,#0A1628);}
.sbg-ocean{background:linear-gradient(180deg,#061220,#0A2438 65%,#081828);}
.sbg-snow{background:linear-gradient(180deg,#141E2C,#1E2E40 65%,#1A2A3A);}
.sg-jungle{background:linear-gradient(180deg,#1A5A2A,#0D3A18);border-top:2px solid #2A8A3A;}
.sg-desert{background:linear-gradient(180deg,#6A4A20,#4A3010);border-top:2px solid #8A6A30;}
.sg-city{background:linear-gradient(180deg,#2A2A3A,#1A1A2A);border-top:2px solid #4A4A6A;}
.sg-sky{background:linear-gradient(180deg,#1A3050,#0D2040);border-top:2px solid #2A5080;}

.sg-snow{background:linear-gradient(180deg,#3A4A5A,#2A3A4A);border-top:2px solid #5A7A8A;}
</style>
</head>

<script>
// ══ 語音系統：台灣女性，速度放慢 ══
let voiceOn=true, zhVoice=null;

function initVoice(){
  const vs=speechSynthesis.getVoices();
  if(!vs.length) return; // 還沒載入完，等 onvoiceschanged

  // 1. 優先：台灣中文女性（iOS 常見名稱）
  zhVoice =
    vs.find(v=>v.lang==='zh-TW' && /meijia|mei-jia|sin-ji|yating|ya-ting|yu-shu|siri.*zh|zh.*siri/i.test(v.name)) ||
  // 2. 任何台灣中文
    vs.find(v=>v.lang==='zh-TW') ||
  // 3. 中文（香港或中國大陸）
    vs.find(v=>/^zh/i.test(v.lang)) ||
    null;
}

// iOS 需要等 voiceschanged，桌面瀏覽器通常同步就能取到
if(speechSynthesis.getVoices().length) initVoice();
speechSynthesis.onvoiceschanged = initVoice;
setTimeout(initVoice, 500);
setTimeout(initVoice, 1500); // 雙保險，iOS 有時候很慢

function speak(text, rate=0.68, pitch=1.08){
  if(!voiceOn) return;
  try{
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang  = 'zh-TW';
    u.rate  = rate;   // 0.68 = 慢約30%，適合小孩
    u.pitch = pitch;  // 1.08 = 稍微偏高，接近女聲
    if(zhVoice) u.voice = zhVoice;
    speechSynthesis.speak(u);
  }catch(e){}
}

// 注音唸法對應
const ZH_S={
  'ㄅ':'ㄅㄛ','ㄆ':'ㄆㄛ','ㄇ':'ㄇㄛ','ㄈ':'ㄈㄛ',
  'ㄉ':'ㄉㄜ','ㄊ':'ㄊㄜ','ㄋ':'ㄋㄜ','ㄌ':'ㄌㄜ',
  'ㄍ':'ㄍㄜ','ㄎ':'ㄎㄜ','ㄏ':'ㄏㄜ',
  'ㄐ':'ㄐㄧ','ㄑ':'ㄑㄧ','ㄒ':'ㄒㄧ',
  'ㄓ':'ㄓ','ㄔ':'ㄔ','ㄕ':'ㄕ','ㄖ':'ㄖ',
  'ㄗ':'ㄗ','ㄘ':'ㄘ','ㄙ':'ㄙ',
  'ㄚ':'啊','ㄛ':'喔','ㄜ':'鵝','ㄞ':'哀','ㄟ':'欸',
  'ㄠ':'凹','ㄡ':'歐','ㄢ':'安','ㄣ':'恩','ㄤ':'昂','ㄥ':'鞥','ㄦ':'兒',
  'ㄧ':'一','ㄨ':'烏','ㄩ':'魚'
};

// 「X的X」格式：用第一個字組成「蝙蝠的蝙」
function speakItem(item){
  // 第一個字的發音：「蝙蝠的蝙」
  const firstChar = item.nm.replace(/[！!？?。，、]/g,'')[0];
  const phrase = `${item.nm}的${firstChar}`;
  speak(phrase);
  // 停頓後再唸注音
  setTimeout(()=> speak(ZH_S[item.zh]||item.zh, 0.65, 1.05), 1400);
}

// 題目語音：「蝙蝠的蝙，注音是哪一個？」
function speakQuiz(item){
  const firstChar = item.nm.replace(/[！!？?。，、]/g,'')[0];
  speak(`${item.nm}的${firstChar}，注音是哪一個？`);
}

function speakCorrect(){ speak('答對了！太棒了！', 0.72, 1.1); }
function speakWrong(c){  speak(`再試一次！`, 0.72, 1.0); }

// ══ 星星背景 ══
function buildStarsBg(id){
  const c=document.getElementById(id); if(!c)return; c.innerHTML='';
  for(let i=0;i<90;i++){
    const s=document.createElement('div'); s.className='star';
    const sz=Math.random()<0.3?3:Math.random()<0.6?2:1;
    s.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*100}%;width:${sz}px;height:${sz}px;--d:${2+Math.random()*4}s;--delay:${Math.random()*4}s;opacity:${0.2+Math.random()*0.8};`;
    c.appendChild(s);
  }
}
buildStarsBg('hp-stars');

// 首頁角色輪播
const HP_CHARS=['🦊','🐆','🐔','🦨','🦇','🦀','🦅','🐟'];
let hci=0;
setInterval(()=>{
  hci=(hci+1)%HP_CHARS.length;
  const el=document.getElementById('hp-char');
  if(el){el.style.transform='scale(0.7)';setTimeout(()=>{el.textContent=HP_CHARS[hci];el.style.transform='scale(1)';},150);}
},900);

// 首頁浮動裝飾
(function(){
  const hp=document.getElementById('homepage');
  const items=['✨','⭐','💫','🔍','🌟'];
  [{left:'8%',top:'15%'},{left:'88%',top:'12%'},{left:'5%',top:'60%'},{left:'92%',top:'55%'},{left:'15%',top:'85%'},{left:'80%',top:'82%'}]
  .forEach((pos,i)=>{
    const p=document.createElement('div'); p.className='hp-particle';
    p.textContent=items[i%items.length];
    p.style.cssText=`left:${pos.left};top:${pos.top};--d:${3+i*0.5}s;--delay:${i*0.4}s;opacity:0.3;`;
    hp.appendChild(p);
  });
})();

// ══ 樣式 ══
const S={

  optBtn:(i)=>{
    const b=['rgba(0,255,178,0.75)','rgba(123,97,255,0.75)','rgba(255,107,107,0.75)','rgba(255,217,61,0.75)'];
    const bg=['rgba(0,255,178,0.1)','rgba(123,97,255,0.1)','rgba(255,107,107,0.1)','rgba(255,217,61,0.1)'];
    return `display:block;width:100%;padding:15px 4px;border:2px solid ${b[i]};border-radius:14px;background:${bg[i]};font-size:2rem;font-family:sans-serif;cursor:pointer;color:#FFFFFF;text-align:center;line-height:1.25;transition:all 0.15s;`;
  },
  doneBtn:`display:inline-block;margin-top:20px;padding:14px 36px;border:none;border-radius:50px;background:linear-gradient(135deg,#00FFB2,#7B61FF);color:#08111F;font-weight:900;font-size:1rem;cursor:pointer;font-family:'Nunito',sans-serif;`,
};

// ══ 資料 ══
const ZONES=[
  {id:0,label:'洞穴基地',scene:'jungle',guide:'🦇',x:75,y:130,col:'#00FFB2',un:true,done:false,items:[

    {zh:'ㄆ',ico:'🫧',nm:'泡泡',fact:'輕輕一吹就飛走！'},

  {id:2,label:'城市總部',scene:'city',guide:'🐔',x:370,y:135,col:'#7B61FF',un:false,done:false,items:[
    {zh:'ㄍ',ico:'🐶',nm:'狗狗',fact:'鼻子超厲害，可以聞到幾公里外！'},
    {zh:'ㄎ',ico:'🦕',nm:'恐龍',fact:'在地球上生活了超過一億年！'},
    {zh:'ㄏ',ico:'🦊',nm:'狐狸',fact:'就像動物謎案裡的琪特一樣聰明！'},

    {zh:'ㄢ',ico:'🍊',nm:'橘子',fact:'剝開香香的，一片一片超好吃！'},

    {zh:'ㄤ',ico:'🦅',nm:'老鷹',fact:'在天空翱翔，眼睛可以看超遠！'},
    {zh:'ㄥ',ico:'🐝',nm:'蜜蜂',fact:'嗡嗡嗡，採花蜜釀蜂蜜！'},
    {zh:'ㄦ',ico:'👂',nm:'耳朵',fact:'讓我們聽到各種聲音！'},
  ]},
  {id:7,label:'介母星球',scene:'sky',guide:'🐟',x:595,y:275,col:'#A29BFE',un:false,done:false,items:[
    {zh:'ㄧ',ico:'🐜',nm:'螞蟻',fact:'可以搬比自己重好幾倍的東西！'},
    {zh:'ㄨ',ico:'🐸',nm:'青蛙',fact:'說「呱呱呱」，跳超高！'},
    {zh:'ㄩ',ico:'🐟',nm:'魚魚',fact:'用鰓呼吸，住在水裡！'},

const UNLOCK_MAP={0:[1],1:[2,3],2:[4],3:[5,6],4:[7]};
const PATHS=[[0,1],[1,2],[1,3],[2,4],[3,5],[3,6],[4,7]];
const ALL_ZH=['ㄅ','ㄆ','ㄇ','ㄈ','ㄉ','ㄊ','ㄋ','ㄌ','ㄍ','ㄎ','ㄏ','ㄐ','ㄑ','ㄒ','ㄓ','ㄔ','ㄕ','ㄖ','ㄗ','ㄘ','ㄙ','ㄚ','ㄛ','ㄜ','ㄞ','ㄟ','ㄠ','ㄡ','ㄢ','ㄣ','ㄤ','ㄥ','ㄦ','ㄧ','ㄨ','ㄩ'];

let stars=0, curZone=null, curItemIdx=0;

// ══ 存檔 ══
function saveProgress(){
  try{
    localStorage.setItem('clade_v1', JSON.stringify({
      stars,
      zones: ZONES.map(z=>({id:z.id,un:z.un,done:z.done}))
    }));
  }catch(e){}
}
function loadProgress(){
  try{
    const raw=localStorage.getItem('clade_v1');
    if(!raw)return;
    const data=JSON.parse(raw);
    stars=data.stars||0;
    data.zones.forEach(s=>{ const z=ZONES.find(z=>z.id===s.id); if(z){z.un=s.un;z.done=s.done;} });
  }catch(e){}
}

// ══ Gems ══
function buildGems(){
  const el=document.getElementById('map-gems'); if(!el)return; el.innerHTML='';
  for(let i=0;i<5;i++){const g=document.createElement('div');g.className='mgem'+(i<stars?' on':'');el.appendChild(g);}
}
function addStar(){stars=Math.min(5,stars+1);buildGems();saveProgress();}

// ══ 首頁 ══
function startGame(){
  loadProgress();
  const hp=document.getElementById('homepage');
  hp.style.animation='fdout 0.5s ease forwards';
  setTimeout(()=>{ hp.style.display='none'; showMap(); },450);
}

// ══ 地圖 ══
function showMap(){
  try{speechSynthesis.cancel();}catch(e){}
  document.getElementById('lesson').style.display='none';
  document.getElementById('worldmap').style.display='block';
  buildGems(); buildZones();
}

function buildZones(){
  const c=document.getElementById('zones-container'); c.innerHTML='';
  PATHS.forEach(([a,b])=>{
    const za=ZONES[a],zb=ZONES[b];
    const x1=za.x+40,y1=za.y+40,x2=zb.x+40,y2=zb.y+40;
    const len=Math.sqrt((x2-x1)**2+(y2-y1)**2);
    const angle=Math.atan2(y2-y1,x2-x1)*180/Math.PI;
    const line=document.createElement('div'); line.className='path-line';
    line.style.cssText=`width:${len}px;height:2px;left:${x1}px;top:${y1}px;transform-origin:0 50%;transform:rotate(${angle}deg);`;
    c.appendChild(line);
    for(let t=0.25;t<0.85;t+=0.25){
      const dot=document.createElement('div'); dot.className='path-dot';
      dot.style.cssText=`left:${x1+(x2-x1)*t-2.5}px;top:${y1+(y2-y1)*t-2.5}px;animation-delay:${t*1.2}s;`;
      c.appendChild(dot);
    }
  });
  ZONES.forEach(z=>{
    const el=document.createElement('div');
    el.className='zone'+(z.un?'':' locked');
    el.style.cssText=`left:${z.x}px;top:${z.y}px;width:80px;height:80px;`;
    if(z.un) el.onclick=()=>enterZone(z.id);
    const col=z.un?z.col:'#3A5F88';
    const doneTag=z.done?`<div style="position:absolute;top:-8px;left:50%;transform:translateX(-50%);background:#00FFB2;border-radius:50%;width:18px;height:18px;display:flex;align-items:center;justify-content:center;font-size:10px;color:#08111F;font-weight:900;box-shadow:0 0 8px #00FFB2;">✓</div>`:'';
    el.innerHTML=`
      <svg width="80" height="70" viewBox="0 0 80 70">
        <polygon points="40,2 78,22 78,48 40,68 2,48 2,22" fill="${col}18" stroke="${col}" stroke-width="1.5"/>
        <polygon points="40,10 70,26 70,44 40,60 10,44 10,26" fill="${col}0A" stroke="${col}44" stroke-width="1"/>
      </svg>
      ${doneTag}
      <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-60%);font-size:1.9rem;${z.un?'animation:fl 3s ease-in-out infinite;':''}">${z.un?z.guide:'🔒'}</div>
      <div style="position:absolute;bottom:-20px;left:50%;transform:translateX(-50%);font-family:'Orbitron',monospace;font-size:7px;color:${col};white-space:nowrap;">${z.label}</div>
      ${z.un&&!z.done?`<div class="zone-glow" style="background:${z.col};"></div>`:''}
    `;
    c.appendChild(el);
  });
}

// ══ 進入地點 ══
function enterZone(zid){
  curZone=ZONES[zid]; curItemIdx=0;
  document.getElementById('worldmap').style.display='none';
  document.getElementById('lesson').style.display='block';
  document.getElementById('guide-ch').textContent=curZone.guide;
  document.getElementById('lbg').className='lesson-bg sbg-'+curZone.scene;
  document.getElementById('sground').className='scene-ground sg-'+curZone.scene;
  speak('進入'+curZone.label+'，開始任務！');
  showLearn();
}

// ══ 學習卡 ══
function showLearn(){
  const item=curZone.items[curItemIdx];
  const total=curZone.items.length;
  document.getElementById('step-ind').textContent=`${curItemIdx+1}/${total} 學習`;
  setTimeout(()=>speakItem(item),400);
  const ca=document.getElementById('card-area'); ca.innerHTML='';
  mkBackVol(ca);

  // 外層：flex 置中容器（不會被動畫位移）
  const wrap=document.createElement('div');
  wrap.style.cssText=S.learnCard;

  // 內層：真正的卡片
  const card=document.createElement('div');
  card.style.cssText=S.learnInner;
  card.innerHTML=`
    <div style="font-size:4.5rem;margin-bottom:10px;line-height:1;">${item.ico}</div>
    <div style="font-size:1.25rem;font-weight:900;color:#E2F0FF;margin-bottom:6px;">${item.nm}</div>
    <div style="font-size:0.8rem;color:#6A90B8;line-height:1.6;max-width:220px;margin:0 auto;">${item.fact}</div>
  `;
  const row=document.createElement('div');
  row.style.cssText='display:flex;align-items:center;justify-content:center;gap:10px;margin-top:16px;flex-wrap:wrap;';
  const sayBtn=document.createElement('button');
  sayBtn.style.cssText=S.sayBtn;
  sayBtn.innerHTML='🔊 再聽';
  sayBtn.onclick=()=>speakItem(item);
  row.appendChild(sayBtn);
  const nextBtn=document.createElement('button');
  nextBtn.style.cssText=S.nextBtn;
  nextBtn.innerHTML='來挑戰 →';
  nextBtn.onclick=()=>showQuiz(item);
  row.appendChild(nextBtn);
  card.appendChild(row);
  wrap.appendChild(card);
  ca.appendChild(wrap);
}

// ══ 答題卡 ══
function showQuiz(item){
  document.getElementById('step-ind').textContent=`${curItemIdx+1}/${curZone.items.length} 挑戰`;
  setTimeout(()=>speakQuiz(item),300);
  const opts=getOpts(item.zh);
  const ca=document.getElementById('card-area'); ca.innerHTML='';
  mkBackVol(ca);
  renderQuizCard(ca,item,opts);
}

function renderQuizCard(ca,item,opts){
  const firstChar=item.nm.replace(/[！!？?。，、]/g,'')[0];

  // 外層：flex 置中容器
  const wrap=document.createElement('div');
  wrap.style.cssText=S.quizCard;

  // 內層：真正的卡片
  const card=document.createElement('div');
  card.style.cssText=S.quizInner;
  card.innerHTML=`
    <div style="font-size:3.8rem;margin-bottom:6px;line-height:1;">${item.ico}</div>
    <div style="font-size:1rem;font-weight:700;color:#E2F0FF;margin-bottom:4px;">${item.nm}的${firstChar}，注音是？</div>
    <div style="font-family:'Orbitron',monospace;font-size:7px;letter-spacing:0.12em;color:#3A5A78;margin-bottom:12px;">// 選出正確的注音符號</div>
  `;
  const grid=document.createElement('div');
  grid.style.cssText='display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:8px;';

  opts.forEach((o,i)=>{
    const b=document.createElement('button');
    b.id='qb'+o.charCodeAt(0);
    b.textContent=o;
    b.style.cssText=S.optBtn(i);
    b.dataset.origStyle=S.optBtn(i);
    b.dataset.origIdx=i;
    b.onclick=()=>checkQ(o,item,opts,grid,parseInt(b.dataset.origIdx));
    grid.appendChild(b);
  });
  card.appendChild(grid);

  const fb=document.createElement('div');
  fb.id='qfb';
  fb.style.cssText='min-height:30px;display:flex;align-items:center;justify-content:center;';
  card.appendChild(fb);
  wrap.appendChild(card);
  ca.appendChild(wrap);
}

function checkQ(chosen,item,opts,grid,chosenIdx){
  const cb=document.getElementById('qb'+chosen.charCodeAt(0));
  const ab=document.getElementById('qb'+item.zh.charCodeAt(0));
  const fb=document.getElementById('qfb');

  if(chosen===item.zh){
    // ✅ 答對
    grid.querySelectorAll('button').forEach(b=>b.style.pointerEvents='none');
    cb.style.cssText+=';border-color:#00FFB2!important;background:rgba(0,255,178,0.22)!important;box-shadow:0 0 18px rgba(0,255,178,0.55);animation:bump 0.35s;';
    fb.innerHTML='<span style="font-size:1.6rem;">⭐⭐⭐</span><span style="font-family:Orbitron,monospace;font-size:9px;color:#00FFB2;letter-spacing:0.1em;margin-left:6px;">完全正確！</span>';
    speakCorrect(); addStar(); spawnParticles();
    setTimeout(()=>nextItem(),1500);

  } else {
    // ❌ 答錯 — 閃紅、震動，然後恢復可選，不跳題
    cb.style.cssText+=';border-color:#FF6B6B!important;background:rgba(255,107,107,0.25)!important;animation:shake 0.4s;';
    fb.innerHTML='<span style="font-size:1.2rem;">❌</span><span style="font-family:Orbitron,monospace;font-size:8px;color:#FF6B6B;letter-spacing:0.08em;margin-left:6px;">再試試看！</span>';
    speakWrong(item.zh);

    // 短暫鎖住後恢復（讓孩子看清楚再重選）
    grid.querySelectorAll('button').forEach(b=>b.style.pointerEvents='none');
    setTimeout(()=>{
      // 恢復按鈕可點，清掉紅色
      cb.style.cssText=cb.dataset.origStyle||S.optBtn(chosenIdx);
      cb.id='qb'+chosen.charCodeAt(0); // 確保 id 還在
      fb.innerHTML='';
      grid.querySelectorAll('button').forEach(b=>b.style.pointerEvents='auto');
      // 重新唸題目提示
      speakQuiz(item);
    },1200);
  }
}

function nextItem(){
  curItemIdx++;
  if(curItemIdx>=curZone.items.length) showComplete();
  else showLearn();
}

function getOpts(correctZh){
  const wrong=ALL_ZH.filter(z=>z!==correctZh).sort(()=>Math.random()-0.5).slice(0,3);
  return [correctZh,...wrong].sort(()=>Math.random()-0.5);
}

// ══ 通關 ══
function showComplete(){
  const toUnlock=UNLOCK_MAP[curZone.id]||[];
  toUnlock.forEach(id=>ZONES[id].un=true);
  ZONES[curZone.id].done=true;
  saveProgress();
  speak(curZone.label+'任務完成！超厲害！');
  spawnParticles(); spawnParticles();
  const allDone=ZONES.every(z=>z.done);
  const ca=document.getElementById('card-area'); ca.innerHTML='';
  const box=document.createElement('div');
  box.style.cssText='position:absolute;inset:0;background:rgba(6,12,24,0.94);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:30;padding:24px;text-align:center;';
  const unlockMsg=toUnlock.length>0?`<div style="font-size:0.82rem;color:#FFD93D;margin-top:8px;line-height:1.6;">🔓 新地點開放：${toUnlock.map(id=>ZONES[id].label).join('、')}</div>`:'';
  const allDoneMsg=allDone?`<div style="margin-top:12px;padding:10px 20px;border:1px solid #FFD93D;border-radius:12px;background:rgba(255,217,61,0.08);font-size:0.82rem;color:#FFD93D;line-height:1.6;">🏅 恭喜成為 C.L.A.D.E. 注音大偵探！</div>`:'';
  box.innerHTML=`
    <div style="font-size:3.8rem;animation:fl 1.5s ease-in-out infinite;">${allDone?'🥇':'🏆'}</div>
    <div style="font-size:1.3rem;font-weight:900;color:#00FFB2;margin:12px 0 4px;font-family:'Orbitron',monospace;letter-spacing:0.1em;">任務完成！</div>
    <div style="font-size:0.85rem;color:#6A90B8;">${curZone.label} 全部通關！</div>
    ${unlockMsg}${allDoneMsg}
  `;
  const btn=document.createElement('button');
  btn.textContent='← 回到地圖繼續冒險';
  btn.style.cssText=S.doneBtn;
  btn.onclick=showMap;
  box.appendChild(btn);
  ca.appendChild(box);
}

// ══ 工具 ══
function mkBackVol(ca){
  const back=document.createElement('button');
  back.textContent='← 地圖'; back.style.cssText=S.backBtn;
  back.onclick=()=>{try{speechSynthesis.cancel();}catch(e){} showMap();};
  ca.appendChild(back);
  const vol=document.createElement('button');
  vol.style.cssText=S.volBtn; vol.textContent=voiceOn?'🔊':'🔇';
  vol.onclick=()=>{voiceOn=!voiceOn;vol.textContent=voiceOn?'🔊':'🔇';if(!voiceOn)try{speechSynthesis.cancel();}catch(e){}};
  ca.appendChild(vol);
}

function spawnParticles(){
  const c=document.getElementById('particles'); if(!c)return;
  ['⭐','✨','💫','🌟','🎉','⚡'].forEach((e,i)=>{
    const p=document.createElement('div'); p.className='particle';
    p.style.cssText=`left:${10+Math.random()*80}%;bottom:${100+Math.random()*100}px;font-size:${1+Math.random()*1}rem;--d:${0.8+Math.random()*0.6}s;animation-delay:${i*0.07}s;`;
    p.textContent=e; c.appendChild(p); setTimeout(()=>p.remove(),1800);
  });
}
</script>
